services:
  mnist-compact:
    build:
      context: .
    image: mnist-compact:latest
    expose:
      - "8000"
    environment:
      APP_NAME: mnist-compact-api
      DATABASE_PATH: /app/runtime/app.db
      ANNOTATION_STORAGE_PATH: /app/runtime/annotations
      TEST_DATASET_PATH: /app/runtime/test
      MNIST_STORAGE_PATH: /app/backend/data/mnist
      FRONTEND_DIST_PATH: /app/dist
      ADMIN_UI_BASE_URL: ${ADMIN_UI_BASE_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      TEAM_ANNOTATION_GOAL: ${TEAM_ANNOTATION_GOAL:-50}
      TEAM_MEMBER_LIMIT: ${TEAM_MEMBER_LIMIT:-5}
      SESSION_DURATION_HOURS: ${SESSION_DURATION_HOURS:-24}
      SUBMISSION_CHALLENGE_TTL_MINUTES: ${SUBMISSION_CHALLENGE_TTL_MINUTES:-10}
      SUBMISSION_COOLDOWN_MINUTES: ${SUBMISSION_COOLDOWN_MINUTES:-5}
      SUBMISSION_TEAM_MAX_ATTEMPTS: ${SUBMISSION_TEAM_MAX_ATTEMPTS:-10}
      DEFAULT_TEST_DATASET_SOURCE: ${DEFAULT_TEST_DATASET_SOURCE:-local_test}
    volumes:
      - mnist-runtime:/app/runtime
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - mnist-compact
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  mnist-runtime:
